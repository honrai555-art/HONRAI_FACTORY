<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HONRAI Career Card AGI Input System</title>
    <style>
      <?!= include('Frontend/style'); ?>
    </style>
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">HONRAI FACTORY MVP</p>
        <h1>Career Card AGI Input System</h1>
        <p class="lead">
          キャリアカードをSTRUCT化し、AGIが街道WALK配置命令JSONを生成できる状態にします。
        </p>
      </section>

      <section class="panel form-panel" aria-labelledby="form-title">
        <div class="panel-header">
          <div>
            <h2 id="form-title">キャリアカード入力</h2>
            <p>保存後、AGI判定を実行するとSTRUCTとlayout_command.jsonを画面へ表示します。</p>
          </div>
          <span id="statusBadge" class="status-badge">未保存</span>
        </div>

        <form id="careerCardForm" class="career-form">
          <input type="hidden" id="card_id" name="card_id" />
          <input type="hidden" id="user_id" name="user_id" value="demo-user" />

          <label>
            タイプ
            <select id="type" name="type" required>
              <option value="">選択してください</option>
              <option value="主人公">主人公</option>
              <option value="相棒">相棒</option>
              <option value="ライバル">ライバル</option>
              <option value="メンター">メンター</option>
              <option value="サポートAI">サポートAI</option>
              <option value="技術／ガジェット">技術／ガジェット</option>
              <option value="進化／変化">進化／変化</option>
            </select>
          </label>

          <label>
            適合率
            <input id="fit_score" name="fit_score" type="number" min="0" max="100" step="1" value="72" required />
          </label>

          <label>
            フェーズ
            <input id="phase" name="phase" type="text" placeholder="例: 探索 / 転換 / 実装" required />
          </label>

          <label>
            役割候補
            <input id="role_candidate" name="role_candidate" type="text" placeholder="例: explorer" required />
          </label>

          <label>
            やめる（改行またはカンマ区切り）
            <textarea id="stop" name="stop" rows="3" placeholder="例: 目的のない応募\n過去職種への固定観念"></textarea>
          </label>

          <label>
            残す（改行またはカンマ区切り）
            <textarea id="keep" name="keep" rows="3" placeholder="例: 顧客理解\n現場改善"></textarea>
          </label>

          <label>
            やる（改行またはカンマ区切り）
            <textarea id="start" name="start" rows="3" placeholder="例: ポートフォリオ整備\nAIツール検証"></textarea>
          </label>

          <label>
            経験（改行またはカンマ区切り）
            <textarea id="experience" name="experience" rows="3" placeholder="例: 営業企画\n業務改善"></textarea>
          </label>

          <label>
            スキル（改行またはカンマ区切り）
            <textarea id="skill" name="skill" rows="3" placeholder="例: データ分析\nプロンプト設計"></textarea>
          </label>

          <label>
            環境（改行またはカンマ区切り）
            <textarea id="environment" name="environment" rows="3" placeholder="例: リモート可\n少人数チーム"></textarea>
          </label>

          <label class="full-width">
            望む変化
            <textarea id="desired_change" name="desired_change" rows="3" placeholder="例: 創造性を活かせるAIプロダクト職へ移る"></textarea>
          </label>

          <div class="actions full-width">
            <button id="saveButton" type="submit">保存</button>
            <button id="agiButton" type="button" class="secondary">AGI判定実行</button>
          </div>
        </form>
      </section>

      <section class="results-grid">
        <article class="panel">
          <h2>STRUCT JSON</h2>
          <pre id="structOutput" class="json-output">{}</pre>
        </article>
        <article class="panel">
          <h2>layout_command.json</h2>
          <pre id="layoutOutput" class="json-output">{}</pre>
        </article>
      </section>
    </main>

    <script>
      <?!= include('Frontend/app'); ?>
    </script>
  </body>
</html>
